
<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>To-Do List Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #020617; --accent: #6366f1; }
        .theme-dark-neon { --bg: #030712; --accent: #6366f1; }
        .theme-cyber-pink { --bg: #0f051d; --accent: #ec4899; }
        .theme-sunset { --bg: #1a0510; --accent: #f43f5e; }
        .theme-forest { --bg: #022c22; --accent: #10b981; }
        .theme-ocean { --bg: #082f49; --accent: #0ea5e9; }
        .theme-gold { --bg: #291e00; --accent: #ca8a04; }
        .theme-amethyst { --bg: #2e1065; --accent: #a855f7; }
        .theme-coffee { --bg: #291711; --accent: #a16207; }
        .theme-blood { --bg: #3c0707; --accent: #ef4444; }
        .theme-mono { --bg: #000000; --accent: #ffffff; }
        body { background-color: var(--bg); transition: background 0.5s; }
        .bg-accent { background-color: var(--accent); }
        .text-accent { color: var(--accent); }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden p-4 flex items-center justify-center">

    <main class="w-full max-w-md bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-5 shadow-2xl">
        <header class="flex items-center justify-between mb-6 pb-4 border-b border-white/10">
            <div class="flex gap-2">
                <button onclick="switchTab('active')" class="px-3 py-1 bg-white/10 text-white rounded-lg text-xs font-bold">Tâches</button>
                <button onclick="switchTab('deleted')" class="px-3 py-1 text-slate-400 rounded-lg text-xs font-bold">Corbeille</button>
            </div>
            <div class="flex gap-2">
                <select onchange="applyTheme(this.value)" class="bg-transparent text-xs text-slate-400 outline-none">
                    <option value="theme-dark-neon">Neon</option><option value="theme-cyber-pink">Pink</option>
                    <option value="theme-sunset">Sunset</option><option value="theme-forest">Forest</option>
                    <option value="theme-ocean">Ocean</option><option value="theme-gold">Gold</option>
                    <option value="theme-amethyst">Purple</option><option value="theme-coffee">Coffee</option>
                    <option value="theme-blood">Blood</option><option value="theme-mono">Mono</option>
                </select>
                <button onclick="shareData()" class="text-slate-400"><i data-lucide="share-2" class="w-4 h-4"></i></button>
                <button onclick="downloadData()" class="text-slate-400"><i data-lucide="download" class="w-4 h-4"></i></button>
            </div>
        </header>

        <form id="todo-form" class="flex gap-2 mb-4">
            <input type="text" id="task-input" required placeholder="Ajouter une tâche..." class="flex-1 px-4 py-2 bg-white/5 border border-white/10 rounded-xl text-white text-sm focus:outline-none">
            <button type="submit" class="px-4 bg-accent text-white rounded-xl"><i data-lucide="plus" class="w-4 h-4"></i></button>
        </form>

        <div id="tasks-container" class="space-y-2"></div>
    </main>

    <script>
        let tasks = JSON.parse(localStorage.getItem('my_tasks')) || [];
        let currentTab = 'active';

        function save() { localStorage.setItem('my_tasks', JSON.stringify(tasks)); render(); }
        function applyTheme(t) { document.body.className = `min-h-screen overflow-x-hidden p-4 flex items-center justify-center ${t}`; localStorage.setItem('theme', t); }
        
        function render() {
            const container = document.getElementById('tasks-container');
            container.innerHTML = '';
            tasks.filter(t => currentTab === 'active' ? !t.deleted : t.deleted).forEach(task => {
                const div = document.createElement('div');
                div.className = "flex items-center justify-between p-3 bg-white/5 rounded-xl border border-white/5 text-white";
                div.innerHTML = `<span class="${task.completed ? 'line-through opacity-50' : ''} text-sm cursor-pointer" onclick="toggleTask('${task.id}')">${task.title}</span>
                                 <button onclick="moveToTrash('${task.id}')" class="text-slate-500 hover:text-rose-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>`;
                container.appendChild(div);
            });
            lucide.createIcons();
        }

        function toggleTask(id) { tasks = tasks.map(t => t.id === id ? {...t, completed: !t.completed} : t); save(); }
        function moveToTrash(id) { tasks = tasks.map(t => t.id === id ? {...t, deleted: true} : t); save(); }
        function switchTab(tab) { currentTab = tab; render(); }
        
        document.getElementById('todo-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const input = document.getElementById('task-input');
            tasks.unshift({ id: Date.now().toString(), title: input.value, completed: false, deleted: false });
            input.value = '';
            save();
        });

        // Partage et téléchargement
        async function shareData() {
            const text = tasks.filter(t => !t.deleted).map(t => t.title).join('\n');
            if (navigator.share) await navigator.share({ text: text });
        }
        function downloadData() {
            const blob = new Blob([tasks.map(t => t.title).join('\n')], { type: 'text/plain' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'tasks.txt'; a.click();
        }

        // Chargement initial
        applyTheme(localStorage.getItem('theme') || 'theme-dark-neon');
        render();
    </script>
</body>
</html>
