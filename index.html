
<!DOCTYPE html>
<html lang="fr" class="h-full transition-colors duration-500">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ma To-Do List Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
        
        :root {
            --bg-color: #020617; 
            --glass-bg: rgba(15, 23, 42, 0.85);
            --text-color: #f1f5f9;
            --text-muted: #94a3b8;
            --accent-start: #4f46e5;
            --accent-end: #c026d3;
            --border-color: rgba(255, 255, 255, 0.08);
            --orbe-1: rgba(79, 70, 229, 0.3);
            --orbe-2: rgba(192, 38, 211, 0.2);
            --orbe-3: rgba(6, 182, 212, 0.2);
            --shadow-accent: rgba(79, 70, 229, 0.25);
        }

        .theme-dark-neon { --bg-color: #030712; --glass-bg: rgba(17, 24, 39, 0.85); --text-color: #f9fafb; --text-muted: #9ca3af; --accent-start: #6366f1; --accent-end: #d946ef; --border-color: rgba(255, 255, 255, 0.08); --orbe-1: rgba(99, 102, 241, 0.3); --orbe-2: rgba(217, 70, 239, 0.2); --orbe-3: rgba(14, 165, 233, 0.2); --shadow-accent: rgba(99, 102, 241, 0.3); }
        .theme-cyber-pink { --bg-color: #0f051d; --glass-bg: rgba(24, 12, 44, 0.85); --text-color: #fdf2ff; --text-muted: #a78bfa; --accent-start: #ec4899; --accent-end: #06b6d4; --border-color: rgba(236, 72, 153, 0.15); --orbe-1: rgba(236, 72, 153, 0.35); --orbe-2: rgba(6, 115, 244, 0.25); --orbe-3: rgba(167, 139, 250, 0.2); --shadow-accent: rgba(236, 72, 153, 0.3); }
        .theme-sunset-vibes { --bg-color: #1a0510; --glass-bg: rgba(38, 12, 28, 0.85); --text-color: #fff1f2; --text-muted: #fda4af; --accent-start: #f43f5e; --accent-end: #f97316; --border-color: rgba(244, 63, 94, 0.15); --orbe-1: rgba(244, 63, 94, 0.35); --orbe-2: rgba(249, 115, 22, 0.25); --orbe-3: rgba(236, 72, 153, 0.2); --shadow-accent: rgba(244, 63, 94, 0.3); }
        .theme-moss-forest { --bg-color: #022c22; --glass-bg: rgba(4, 47, 38, 0.85); --text-color: #f0fdf4; --text-muted: #a7f3d0; --accent-start: #10b981; --accent-end: #84cc16; --border-color: rgba(16, 185, 129, 0.15); --orbe-1: rgba(16, 185, 129, 0.35); --orbe-2: rgba(132, 204, 22, 0.2); --orbe-3: rgba(20, 184, 166, 0.2); --shadow-accent: rgba(16, 185, 129, 0.3); }
        .theme-nordic-frost { --bg-color: #f1f5f9; --glass-bg: rgba(255, 255, 255, 0.8); --text-color: #0f172a; --text-muted: #475569; --accent-start: #0284c7; --accent-end: #0d9488; --border-color: rgba(15, 23, 42, 0.08); --orbe-1: rgba(14, 165, 233, 0.15); --orbe-2: rgba(20, 184, 166, 0.15); --orbe-3: rgba(165, 180, 252, 0.2); --shadow-accent: rgba(14, 165, 233, 0.15); }
        .theme-japandi-light { --bg-color: #fafaf9; --glass-bg: rgba(255, 255, 255, 0.85); --text-color: #1c1917; --text-muted: #57534e; --accent-start: #78350f; --accent-end: #78716c; --border-color: rgba(28, 25, 23, 0.06); --orbe-1: rgba(217, 119, 6, 0.1); --orbe-2: rgba(120, 113, 108, 0.1); --orbe-3: rgba(231, 229, 228, 0.15); --shadow-accent: rgba(120, 113, 108, 0.1); }
        .theme-dracula-vamp { --bg-color: #181825; --glass-bg: rgba(30, 30, 46, 0.85); --text-color: #cdd6f4; --text-muted: #bac2de; --accent-start: #cba6f7; --accent-end: #a6e3a1; --border-color: rgba(203, 166, 247, 0.15); --orbe-1: rgba(203, 166, 247, 0.25); --orbe-2: rgba(166, 227, 161, 0.15); --orbe-3: rgba(137, 180, 250, 0.2); --shadow-accent: rgba(203, 166, 247, 0.25); }
        .theme-minimal-mono { --bg-color: #000000; --glass-bg: rgba(10, 10, 10, 0.9); --text-color: #ffffff; --text-muted: #a3a3a3; --accent-start: #ffffff; --accent-end: #737373; --border-color: rgba(255, 255, 255, 0.15); --orbe-1: rgba(255, 255, 255, 0.05); --orbe-2: rgba(255, 255, 255, 0.02); --orbe-3: rgba(255, 255, 255, 0.05); --shadow-accent: rgba(255, 255, 255, 0.1); }

        body { background-color: var(--bg-color); color: var(--text-color); }
        .bg-glass { background-color: var(--glass-bg); border-color: var(--border-color); }
        .text-theme { color: var(--text-color); }
        .text-muted-theme { color: var(--text-muted); }
        .bg-accent { background-image: linear-gradient(to right, var(--accent-start), var(--accent-end)); }
        .border-theme { border-color: var(--border-color); }
        .shadow-accent-btn { box-shadow: 0 10px 15px -3px var(--shadow-accent); }
        .bg-orbe-1 { background-color: var(--orbe-1); }
        .bg-orbe-2 { background-color: var(--orbe-2); }
        .bg-orbe-3 { background-color: var(--orbe-3); }

        @keyframes pulse-slow { 0%, 100% { transform: translateY(0px) scale(1); } 50% { transform: translateY(-20px) scale(1.05); } }
        .animate-blob { animation: pulse-slow 8s infinite ease-in-out; }
        .animate-blob-delayed { animation: pulse-slow 12s infinite ease-in-out; animation-delay: 2s; }
        .task-exit { animation: slide-out-right 0.2s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes slide-out-right { to { transform: translateX(100%); opacity: 0; } }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden overflow-y-auto flex items-center justify-center relative p-2 sm:p-4 transition-colors duration-500">

    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute -top-40 -left-40 w-[500px] h-[500px] rounded-full blur-[120px] animate-blob bg-orbe-1 transition-all duration-700"></div>
        <div class="absolute top-1/3 -right-40 w-[500px] h-[500px] rounded-full blur-[140px] animate-blob-delayed bg-orbe-2 transition-all duration-700"></div>
        <div class="absolute -bottom-40 left-1/3 w-[500px] h-[500px] rounded-full blur-[120px] animate-blob bg-orbe-3 transition-all duration-700"></div>
    </div>

    <main class="w-full max-w-md bg-glass backdrop-blur-xl rounded-3xl border p-4 sm:p-5 shadow-2xl relative z-10 flex flex-col max-h-[92vh] sm:max-h-[85vh] transition-all duration-500 border-theme">
        
        <header class="flex items-center justify-between mb-4 pb-3 border-b flex-shrink-0 gap-2 border-theme">
            <div class="flex gap-1 bg-white/5 p-1 rounded-xl border border-theme">
                <button onclick="switchTab('active')" id="tab-active" class="px-3 py-1.5 rounded-lg text-xs font-bold transition-all bg-white/10 text-theme flex items-center gap-1.5">
                    <span>Tâches</span>
                    <span id="count-active" class="px-1.5 py-0.2 bg-white/10 text-[10px] rounded-md transition-all">0</span>
                </button>
                <button onclick="switchTab('deleted')" id="tab-deleted" class="px-3 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-400 hover:text-white flex items-center gap-1.5">
                    <span>Corbeille</span>
                    <span id="count-deleted" class="px-1.5 py-0.2 bg-white/10 text-[10px] rounded-md text-rose-300">0</span>
                </button>
            </div>
            
            <div class="flex items-center gap-1 relative">
                <button onclick="shareSystemDirect()" class="p-2.5 hover:bg-white/10 text-slate-400 hover:text-indigo-400 rounded-xl transition-all" id="btn-share"><i data-lucide="share-2" class="w-4.5 h-4.5"></i></button>
                <button onclick="toggleThemeMenu()" class="p-2.5 hover:bg-white/10 text-slate-400 hover:text-indigo-400 rounded-xl transition-all" id="btn-theme"><i data-lucide="palette" class="w-4.5 h-4.5"></i></button>
                <div id="theme-dropdown" class="hidden absolute right-12 top-0 mt-2 w-52 bg-slate-900/95 border border-white/10 rounded-2xl shadow-2xl py-1.5 z-50 backdrop-blur-lg border-theme">
                    <button onclick="setTheme('dark-neon')" class="w-full text-left px-3 py-1.5 text-xs text-slate-300 hover:bg-white/5 hover:text-white">Dark Neon</button>
                    <button onclick="setTheme('cyber-pink')" class="w-full text-left px-3 py-1.5 text-xs text-slate-300 hover:bg-white/5 hover:text-white">Cyberpink</button>
                    <button onclick="setTheme('nordic-frost')" class="w-full text-left px-3 py-1.5 text-xs text-slate-700 hover:bg-slate-100">Nordic Frost</button>
                </div>
            </div>
        </header>

        <form id="todo-form" class="flex gap-2 mb-4 flex-shrink-0 items-stretch" autocomplete="off">
            <input type="text" id="task-input" required placeholder="Nouvelle tâche..." class="flex-1 px-4 py-3 bg-white/5 border rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50 text-theme placeholder-slate-500 border-theme text-sm">
            <button type="submit" class="px-4 bg-accent shadow-accent-btn text-white rounded-xl"><i data-lucide="plus" class="w-5 h-5"></i></button>
        </form>

        <div class="flex-grow overflow-y-auto pr-1 space-y-2 mb-1 scrollbar-none" id="tasks-container"></div>
    </main>

    <script>
        let tasks = JSON.parse(localStorage.getItem('todo_premium_tasks')) || [];
        let currentTab = 'active';

        function save() { localStorage.setItem('todo_premium_tasks', JSON.stringify(tasks)); render(); }
        
        document.getElementById('todo-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const input = document.getElementById('task-input');
            tasks.unshift({ id: Date.now().toString(), title: input.value, completed: false, deleted: false });
            input.value = '';
            save();
        });

        function switchTab(tab) { currentTab = tab; render(); }
        function toggleTask(id) { tasks = tasks.map(t => t.id === id ? {...t, completed: !t.completed} : t); save(); }
        function moveToTrash(id) { tasks = tasks.map(t => t.id === id ? {...t, deleted: true} : t); save(); }
        function setTheme(t) { document.body.className = `min-h-screen overflow-x-hidden overflow-y-auto flex items-center justify-center relative p-2 transition-colors duration-500 theme-${t}`; localStorage.setItem('theme', t); }
        function toggleThemeMenu() { document.getElementById('theme-dropdown').classList.toggle('hidden'); }

        function render() {
            const container = document.getElementById('tasks-container');
            container.innerHTML = '';
            tasks.filter(t => currentTab === 'active' ? !t.deleted : t.deleted).forEach(task => {
                const div = document.createElement('div');
                div.className = "flex items-center justify-between p-3 bg-white/5 rounded-xl border border-theme";
                div.innerHTML = `<span class="${task.completed ? 'line-through opacity-50' : ''} cursor-pointer text-sm" onclick="toggleTask('${task.id}')">${task.title}</span>
                                 <button onclick="moveToTrash('${task.id}')" class="text-rose-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>`;
                container.appendChild(div);
            });
            lucide.createIcons();
            document.getElementById('count-active').textContent = tasks.filter(t => !t.deleted).length;
            document.getElementById('count-deleted').textContent = tasks.filter(t => t.deleted).length;
        }
        render();
    </script>
</body>
</html>
