<!DOCTYPE html>
<html lang="fr" class="h-full transition-colors duration-500">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ma To-Do List Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen overflow-y-auto flex items-center justify-center relative p-2 sm:p-4 transition-colors duration-500">

    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute -top-40 -left-40 w-[500px] h-[500px] rounded-full blur-[120px] animate-blob bg-orbe-1 transition-all duration-700"></div>
        <div class="absolute top-1/3 -right-40 w-[500px] h-[500px] rounded-full blur-[140px] animate-blob-delayed bg-orbe-2 transition-all duration-700"></div>
        <div class="absolute -bottom-40 left-1/3 w-[500px] h-[500px] rounded-full blur-[120px] animate-blob bg-orbe-3 transition-all duration-700"></div>
    </div>

    <main class="w-full max-w-md bg-glass backdrop-blur-xl rounded-3xl border p-4 sm:p-5 shadow-2xl relative z-10 flex flex-col max-h-[92vh] sm:max-h-[85vh] transition-all duration-500 border-theme">
        
        <header class="flex items-center justify-between mb-4 pb-3 border-b flex-shrink-0 gap-2 border-theme">
            <div class="flex gap-1 bg-white/5 p-1 rounded-xl border border-theme">
                <button onclick="switchTab('active')" id="tab-active" class="px-3 py-1.5 rounded-lg text-xs font-bold transition-all bg-white/10 text-theme flex items-center gap-1.5">
                    <span>Tâches</span>
                    <span id="count-active" class="px-1.5 py-0.2 bg-white/10 text-[10px] rounded-md transition-all">0</span>
                </button>
                <button onclick="switchTab('deleted')" id="tab-deleted" class="px-3 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-400 hover:text-white flex items-center gap-1.5">
                    <span>Corbeille</span>
                    <span id="count-deleted" class="px-1.5 py-0.2 bg-white/10 text-[10px] rounded-md text-rose-300">0</span>
                </button>
            </div>
            
            <div class="flex items-center gap-1 relative">
                <button onclick="shareSystemDirect()" class="p-2.5 hover:bg-white/10 text-slate-400 hover:text-indigo-400 rounded-xl transition-all" title="Partager la liste" id="btn-share">
                    <i data-lucide="share-2" class="w-4.5 h-4.5"></i>
                </button>

                <button onclick="toggleThemeMenu()" class="p-2.5 hover:bg-white/10 text-slate-400 hover:text-indigo-400 rounded-xl transition-all" title="Changer de thème" id="btn-theme">
                    <i data-lucide="palette" class="w-4.5 h-4.5"></i>
                </button>
                
                <div id="theme-dropdown" class="hidden absolute right-12 top-0 mt-2 w-52 bg-slate-900/95 border border-white/10 rounded-2xl shadow-2xl py-1.5 z-50 backdrop-blur-lg border-theme">
                    <div class="px-3 py-1 text-[10px] font-bold text-slate-500 uppercase tracking-wider">Thèmes sombres</div>
                    <button onclick="setTheme('dark-neon')" class="w-full text-left px-3 py-1.5 text-xs text-slate-300 hover:bg-white/5 hover:text-white flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-gradient-to-r from-indigo-500 to-fuchsia-500"></span>Dark Neon
                    </button>
                    <button onclick="setTheme('cyber-pink')" class="w-full text-left px-3 py-1.5 text-xs text-slate-300 hover:bg-white/5 hover:text-white flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-gradient-to-r from-pink-500 to-cyan-500"></span>Cyberpink Neon
                    </button>
                    <button onclick="setTheme('sunset-vibes')" class="w-full text-left px-3 py-1.5 text-xs text-slate-300 hover:bg-white/5 hover:text-white flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-gradient-to-r from-rose-500 to-orange-500"></span>Sunset Vibes
                    </button>
                    <button onclick="setTheme('moss-forest')" class="w-full text-left px-3 py-1.5 text-xs text-slate-300 hover:bg-white/5 hover:text-white flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-gradient-to-r from-emerald-500 to-lime-500"></span>Moss Forest
                    </button>
                    <button onclick="setTheme('dracula-vamp')" class="w-full text-left px-3 py-1.5 text-xs text-slate-300 hover:bg-white/5 hover:text-white flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-gradient-to-r from-purple-500 to-emerald-400"></span>Dracula Vamp
                    </button>
                    <button onclick="setTheme('minimal-mono')" class="w-full text-left px-3 py-1.5 text-xs text-slate-300 hover:bg-white/5 hover:text-white flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-gradient-to-r from-white to-neutral-500"></span>Minimal Mono
                    </button>
                    <div class="px-3 py-1 mt-2 text-[10px] font-bold text-slate-500 uppercase tracking-wider border-t border-white/5 pt-1.5">Thèmes clairs</div>
                    <button onclick="setTheme('nordic-frost')" class="w-full text-left px-3 py-1.5 text-xs text-slate-700 hover:bg-slate-100 hover:text-black flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-gradient-to-r from-sky-500 to-teal-500"></span>Nordic Frost
                    </button>
                    <button onclick="setTheme('japandi-light')" class="w-full text-left px-3 py-1.5 text-xs text-slate-700 hover:bg-slate-100 hover:text-black flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-gradient-to-r from-amber-800 to-stone-500"></span>Japandi Light
                    </button>
                </div>

                <button onclick="exportData()" class="p-2.5 hover:bg-white/10 text-slate-400 hover:text-emerald-400 rounded-xl transition-all" title="Exporter en .txt">
                    <i data-lucide="download" class="w-4.5 h-4.5"></i>
                </button>
            </div>
        </header>

        <div id="toast" class="absolute top-14 left-1/2 transform -translate-x-1/2 -translate-y-4 opacity-0 scale-95 bg-slate-900/90 text-white text-[11px] font-semibold px-4 py-2.5 rounded-xl shadow-xl border border-white/10 flex items-center gap-2 transition-all duration-300 pointer-events-none z-50">
            <span id="toast-message">Notification</span>
        </div>

        <form id="todo-form" class="flex gap-2 mb-4 flex-shrink-0 items-stretch" autocomplete="off">
            <input type="text" id="task-input" required placeholder="Nouvelle tâche..." autofocus
                class="flex-1 px-4 py-3 bg-white/5 border rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50 text-theme placeholder-slate-500 transition-all text-sm border-theme">
            <button type="button" id="btn-voice" onclick="toggleVoiceInput()" class="px-3.5 bg-white/5 border text-slate-400 rounded-xl hover:bg-white/10 hover:text-indigo-400 transition-all border-theme" title="Dicter">
                <i data-lucide="mic" class="w-5 h-5" id="mic-icon"></i>
            </button>
            <button type="submit" class="px-4 bg-accent shadow-accent-btn active:scale-95 text-white rounded-xl transition-all flex items-center justify-center">
                <i data-lucide="plus" class="w-5 h-5"></i>
            </button>
        </form>

        <div id="trash-header" class="hidden justify-between items-center mb-3 flex-shrink-0">
            <span class="text-xs text-slate-400 italic">Corbeille</span>
            <button onclick="emptyTrash()" class="text-[11px] text-rose-400 hover:text-rose-300 flex items-center gap-1 font-bold">
                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i> Vider la corbeille
            </button>
        </div>

        <div class="flex-grow overflow-y-auto pr-1 space-y-2 mb-1 scrollbar-none">
            <div id="tasks-container" class="space-y-2"></div>
            <div id="empty-state" class="hidden flex-col items-center justify-center py-16 text-center text-slate-500">
                <div class="w-12 h-12 rounded-xl bg-white/5 flex items-center justify-center mb-3 border border-theme">
                    <i data-lucide="sparkles" class="w-5 h-5 text-accent-start" id="empty-icon"></i>
                </div>
                <p id="empty-text" class="text-xs font-semibold px-4 text-muted-theme">Aucune tâche</p>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
